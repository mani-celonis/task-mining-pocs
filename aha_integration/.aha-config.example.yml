# Aha! workspace configuration — generated by the setup wizard.
# Run "set up my meeting ideas workflow" in Cursor to create yours.

product_key: EXAMPLE          # Your Aha! product key (from URL)
team: ""                      # Team custom field value, or empty
user_email: ""                # Your Aha! login email (e.g. your.name@celonis.com)

products:
  - name: Product A
    description: "Brief description of what this product does."
    category: Product A        # Aha! Idea category name

  - name: Product B
    description: "Brief description of what this product does."
    category: Product B

legacy_products:               # Optional
  - name: Legacy Product X
    description: "What it was, and what it's being replaced by."

suggestion_portal:             # Used by the aha-feature-suggestions-review skill
  product_key: SUGGESTION      # Aha! product key for Feature Suggestions
  review_status: "In Review"   # Workflow status to filter on

feature_requests:             # Optional (aha-feature-suggestions sync/export skill)
  assignee: "Frederik Chettouh"
  # output_dir: optional absolute path; default is $KNOWLEDGE_ROOT/incoming/feature-suggestions (vault) or
  #   data/feature-suggestions (no KNOWLEDGE_ROOT)
  # output_dir: "/abs/path/to/incoming/feature-suggestions"
  workspace_key: "SUGGESTION"
