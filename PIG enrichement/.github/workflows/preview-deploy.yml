name: PR Preview Deploy

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: pr-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    name: Deploy PR Preview
    if: github.event.action != 'closed' && github.event.pull_request.head.repo.full_name == github.repository
    env:
      GITHUB_TOKEN: ${{ secrets.CELOBOT_GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Comment building status
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const number = context.payload.pull_request.number;
            const branch = context.payload.pull_request.head.ref;
            const sha = context.payload.pull_request.head.sha;
            const shortSha = sha.slice(0, 7);
            const now = new Date();
            const month = now.toLocaleString('en-US', { month: 'short', timeZone: 'UTC' });
            const formattedDate = `${month} ${now.getUTCDate()}, ${now.getUTCFullYear()} ${now.getUTCHours() % 12 || 12}:${String(now.getUTCMinutes()).padStart(2, '0')}${now.getUTCHours() < 12 ? 'am' : 'pm'}`;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const marker = '<!-- pr-preview -->';
            const body = [
              marker,
              '## PR Preview',
              '',
              'Status: 🟠 Building',
              `Branch: ${branch}`,
              `Commit: ${shortSha}`,
              `Updated at: ${formattedDate}`,
              `- Workflow run: ${runUrl}`,
            ].join('\n');
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: number,
            });
            const existing = comments.find((c) => c.user?.type === 'Bot' && c.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner: context.repo.owner, repo: context.repo.repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: number, body });
            }

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build with PR base href
        run: |
          yarn build \
            --configuration production \
            --base-href /pr-${{ github.event.pull_request.number }}/

      - name: Copy index.html to 404.html for SPA routing
        run: cp dist/emotion-playground/browser/index.html dist/emotion-playground/browser/404.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist/emotion-playground/browser
          destination_dir: pr-${{ github.event.pull_request.number }}
          keep_files: true

      - name: Comment deployed status
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const number = context.payload.pull_request.number;
            const branch = context.payload.pull_request.head.ref;
            const sha = context.payload.pull_request.head.sha;
            const shortSha = sha.slice(0, 7);
            const now = new Date();
            const month = now.toLocaleString('en-US', { month: 'short', timeZone: 'UTC' });
            const formattedDate = `${month} ${now.getUTCDate()}, ${now.getUTCFullYear()} ${now.getUTCHours() % 12 || 12}:${String(now.getUTCMinutes()).padStart(2, '0')}${now.getUTCHours() < 12 ? 'am' : 'pm'}`;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const previewUrl = `https://supreme-chainsaw-4q5oznn.pages.github.io/pr-${number}/`;
            const marker = '<!-- pr-preview -->';
            const body = [
              marker,
              '## PR Preview',
              '',
              'Status: 🟢 Deployed',
              `Branch: ${branch}`,
              `Commit: ${shortSha}`,
              `Updated at: ${formattedDate}`,
              '',
              `- Preview: ${previewUrl}`,
              `- Workflow run: ${runUrl}`,
            ].join('\n');
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: number,
            });
            const existing = comments.find((c) => c.user?.type === 'Bot' && c.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner: context.repo.owner, repo: context.repo.repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: number, body });
            }

      - name: Comment error status
        if: failure()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const number = context.payload.pull_request.number;
            const branch = context.payload.pull_request.head.ref;
            const sha = context.payload.pull_request.head.sha;
            const shortSha = sha.slice(0, 7);
            const now = new Date();
            const month = now.toLocaleString('en-US', { month: 'short', timeZone: 'UTC' });
            const formattedDate = `${month} ${now.getUTCDate()}, ${now.getUTCFullYear()} ${now.getUTCHours() % 12 || 12}:${String(now.getUTCMinutes()).padStart(2, '0')}${now.getUTCHours() < 12 ? 'am' : 'pm'}`;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const marker = '<!-- pr-preview -->';
            const body = [
              marker,
              '## PR Preview',
              '',
              'Status: 🔴 Error',
              `Branch: ${branch}`,
              `Commit: ${shortSha}`,
              `Updated at: ${formattedDate}`,
              '',
              `- Workflow run: ${runUrl}`,
            ].join('\n');
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: number,
            });
            const existing = comments.find((c) => c.user?.type === 'Bot' && c.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner: context.repo.owner, repo: context.repo.repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: number, body });
            }

  cleanup-preview:
    runs-on: ubuntu-latest
    name: Remove PR Preview
    if: github.event.action == 'closed' && github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Remove preview folder
        run: |
          PREVIEW_DIR="pr-${{ github.event.pull_request.number }}"
          if [ -d "$PREVIEW_DIR" ]; then
            rm -rf "$PREVIEW_DIR"
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "chore: remove PR preview $PREVIEW_DIR"
            MAX_ATTEMPTS=5
            ATTEMPT=1
            until [ "$ATTEMPT" -gt "$MAX_ATTEMPTS" ]; do
              if git push origin HEAD:gh-pages; then
                echo "Cleanup push succeeded on attempt $ATTEMPT"
                break
              fi
              if [ "$ATTEMPT" -eq "$MAX_ATTEMPTS" ]; then
                echo "Cleanup push failed after $MAX_ATTEMPTS attempts"
                exit 1
              fi
              echo "Push failed, rebasing and retrying..."
              git fetch origin gh-pages
              if ! git rebase origin/gh-pages; then
                git rebase --abort || true
                exit 1
              fi
              sleep $((ATTEMPT * 2))
              ATTEMPT=$((ATTEMPT + 1))
            done
          else
            echo "Preview folder $PREVIEW_DIR does not exist, skipping."
          fi

      - name: Comment cleanup status
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const number = context.payload.pull_request.number;
            const branch = context.payload.pull_request.head.ref;
            const now = new Date();
            const month = now.toLocaleString('en-US', { month: 'short', timeZone: 'UTC' });
            const formattedDate = `${month} ${now.getUTCDate()}, ${now.getUTCFullYear()} ${now.getUTCHours() % 12 || 12}:${String(now.getUTCMinutes()).padStart(2, '0')}${now.getUTCHours() < 12 ? 'am' : 'pm'}`;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const marker = '<!-- pr-preview -->';
            const body = [
              marker,
              '## PR Preview',
              '',
              'Status: 🧹 Removed (PR closed)',
              `Branch: ${branch}`,
              `PR: #${number}`,
              `Updated at: ${formattedDate}`,
              `- Workflow run: ${runUrl}`,
            ].join('\n');
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: number,
            });
            const existing = comments.find((c) => c.user?.type === 'Bot' && c.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner: context.repo.owner, repo: context.repo.repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: number, body });
            }
